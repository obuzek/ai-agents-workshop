# Agent configuration
# Override these values for your AI tool of choice.

# --- Agent identity ---
AGENT_NAME="claude"              # Human-readable name (used in messages)
AGENT_CMD="claude"               # CLI command to launch the agent
AGENT_CONFIG_DIR=".claude"       # Config directory to symlink into worktrees
AGENT_INSTRUCTIONS_FILE="CLAUDE.md"  # Instructions file the agent reads

# --- Git identity ---
# Path to a gitconfig include file that sets user.name, user.email, user.signingkey.
# When set, ai-gh.sh exports GIT_CONFIG_* env vars so the agent uses this identity.
# This mirrors what shell wrapper functions (e.g. fish's claude-code) do.
AGENT_GIT_CONFIG_INCLUDE="$HOME/.gitconfig.d/claude-code"
# Extra directories to prepend to PATH when launching the agent (colon-separated).
AGENT_EXTRA_PATH="$HOME/.claude/bin"

# --- Agent session flags ---
# {id} is replaced with a deterministic UUID v5 derived from repo + issue number.
# AGENT_RESUME_FLAG is tried first; if it fails, AGENT_NEW_SESSION_FLAG is used.
AGENT_RESUME_FLAG="--resume {id}"
AGENT_NEW_SESSION_FLAG="--session-id {id}"
# How to pass an initial prompt (use "-p" for non-interactive/print mode,
# or leave empty to start an interactive session with the prompt).
AGENT_PROMPT_FLAG=""
# Permission mode for the agent session. "acceptEdits" auto-approves file
# operations; combine with allowedTools in .claude/settings.json for full
# autonomy. Set to "" to use the agent's default permission mode.
AGENT_PERMISSION_MODE="acceptEdits"

# --- iTerm colors ---
# Background color while the agent is running (iTerm escape sequence).
# Set to "" to disable. Reset color is your normal terminal background.
ITERM_BG_COLOR="122222"         # teal while agent runs
ITERM_RESET_COLOR="1a1a2e"     # navy (normal terminal)

# --- GitHub MCP server ---
# The env var name in your shell that holds the token for this host.
# For personal repos: GITHUB_TOKEN.  For GHE: something like GHE_TOKEN.
GITHUB_HOST="github.com"
GITHUB_TOKEN_ENV="GITHUB_TOKEN"

# --- Git ---
BRANCH_PREFIX="ai"              # Branches will be named <prefix>/issue-<N>

# --- Worktrees ---
WORKTREE_DIR_NAME=".ai-worktrees"

# --- GitHub labels ---
LABEL_READY="ai-ready"
LABEL_AWAITING="awaiting-approval"
LABEL_APPROVED="plan-approved"
LABEL_WORKING="ai-working"
LABEL_DONE="ai-done"
LABEL_BACKLOG="ai-backlog"
LABEL_CANCELLED="ai-cancelled"

# --- Label colors (GitHub hex, no #) ---
COLOR_READY="0e8a16"
COLOR_AWAITING="fbca04"
COLOR_APPROVED="0e8a16"
COLOR_WORKING="5319e7"
COLOR_DONE="1d76db"
COLOR_BACKLOG="d93f0b"
COLOR_CANCELLED="e4e669"

# --- Label descriptions ---
DESC_READY="Ready for AI agent to pick up"
DESC_AWAITING="Agent posted a plan, awaiting human review"
DESC_APPROVED="Human approved the plan, agent can implement"
DESC_WORKING="Agent is actively implementing"
DESC_DONE="Agent completed work on this issue"
DESC_BACKLOG="Out-of-scope work discovered by agent"
DESC_CANCELLED="Plan rejected or work stopped"

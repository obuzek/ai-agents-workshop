name: Deploy Documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for git info plugins

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install MkDocs as a uv tool
        run: |
          uv tool install mkdocs \
            --with mkdocs-material \
            --with mkdocs-awesome-pages-plugin \
            --with mkdocs-git-revision-date-localized-plugin \
            --with mkdocs-git-authors-plugin \
            --with mkdocs-glightbox \
            --with mkdocs-minify-plugin \
            --with mkdocs-rss-plugin \
            --with mkdocs-table-reader-plugin

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Build and deploy to GitHub Pages
        run: |
          cd docs
          mkdocs gh-deploy --force --clean --verbose

      - name: Summary
        run: |
          echo "✅ Documentation deployed successfully!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Site URL: https://obuzek.github.io/ai-agents-workshop/" >> $GITHUB_STEP_SUMMARY
          echo "📝 Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
